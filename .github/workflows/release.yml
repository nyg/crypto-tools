name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

# ──────────────────────────────────────────────────────────────────────────────
# Job 1: Bump version in package.json, commit, tag, push to master
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release }}
    steps:
      - name: Validate branch
        if: github.ref_name != 'master'
        run: |
          echo "::error::Releases must be created from the master branch (current: ${{ github.ref_name }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          new_version=$(npm version ${{ inputs.bump }} --no-git-tag-version | sed 's/^v//')
          echo "release=$new_version" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/v${{ env.RELEASE_VERSION }}"; then
            echo "::error::Tag v${{ env.RELEASE_VERSION }} already exists"
            exit 1
          fi

      - name: Install git-cliff
        run: |
          gh release download --repo orhun/git-cliff --pattern 'git-cliff-*-x86_64-unknown-linux-gnu.tar.gz'
          tar xzf git-cliff-*-x86_64-unknown-linux-gnu.tar.gz --strip-components=1 --wildcards '*/git-cliff'
          sudo mv git-cliff /usr/local/bin/
          git cliff --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update changelog
        run: git cliff --tag "v${{ env.RELEASE_VERSION }}" -o CHANGELOG.md

      - name: Commit and tag
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): bump version to v${{ env.RELEASE_VERSION }}"
          git tag "v${{ env.RELEASE_VERSION }}"

      - name: Push
        run: |
          git push origin master
          git push origin "v${{ env.RELEASE_VERSION }}"

# ──────────────────────────────────────────────────────────────────────────────
# Job 2: Build Electrobun desktop artifacts on each native platform
# ──────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15        # arm64 (Apple Silicon)
            platform: macOS-arm64
          - os: windows-latest  # x64
            platform: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: v${{ needs.prepare.outputs.release_version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop app
        run: bunx electrobun build --env=stable

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.platform }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Job 3: Assemble GitHub Release
# ──────────────────────────────────────────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: v${{ needs.prepare.outputs.release_version }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename release assets
        run: |
          find artifacts -name '*.dmg' -exec mv {} 'artifacts/CryptoTools.dmg' \;
          find artifacts -name '*.zip' -exec mv {} 'artifacts/CryptoTools.zip' \;

      - name: Create Scoop ZIP
        run: |
          set -euo pipefail
          mkdir -p _scoop_build
          # Scoop distributes a flat portable bundle and updates it via the
          # bucket manifest written below. This app currently does not set
          # release.baseUrl or call Electrobun.Updater, so Scoop installs do
          # not self-update. If a future channel enables Electrobun auto-update,
          # exclude the Scoop build from it or it will overwrite Scoop's
          # managed install directory.
          #
          # The Windows ZIP ships a self-extracting *-Setup.exe; the actual app
          # files are in .installer/*.tar.zst inside the same ZIP. Extract them
          # into a flat zip that Scoop can consume directly (bin\launcher.exe
          # at the root), so no Scoop installer script is required.
          unzip -q artifacts/CryptoTools.zip '.installer/*' -d _scoop_build
          mapfile -t tarballs < <(find _scoop_build/.installer -mindepth 1 -maxdepth 1 -type f -name '*.tar.zst' -print)
          if [ "${#tarballs[@]}" -ne 1 ]; then
            found='(none)'
            if [ "${#tarballs[@]}" -gt 0 ]; then
              found=$(printf '%s ' "${tarballs[@]}")
            fi
            echo "::error::Expected exactly one .tar.zst under _scoop_build/.installer, found: ${found}"
            exit 1
          fi
          zstd -d "${tarballs[0]}" -o _scoop_build/setup.tar
          tar -xf _scoop_build/setup.tar -C _scoop_build
          mapfile -t appdirs < <(find _scoop_build -mindepth 1 -maxdepth 1 -type d ! -name '.installer' -print)
          if [ "${#appdirs[@]}" -ne 1 ]; then
            found='(none)'
            if [ "${#appdirs[@]}" -gt 0 ]; then
              found=$(printf '%s ' "${appdirs[@]}")
            fi
            echo "::error::Expected exactly one app directory under _scoop_build, found: ${found}"
            exit 1
          fi
          if [ ! -f "${appdirs[0]}/bin/launcher.exe" ]; then
            echo "::error::bin/launcher.exe not found under ${appdirs[0]} — Electrobun layout may have changed"
            exit 1
          fi
          ( cd "${appdirs[0]}" && zip -r "$GITHUB_WORKSPACE/artifacts/CryptoTools-Scoop.zip" . )
          rm -rf _scoop_build

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          args: --latest --strip all

      - name: Append macOS install guidance to release notes
        run: |
          cat >> git-cliff/CHANGELOG.md <<'EOF'

          ## Installing on macOS

          The app is ad-hoc signed but **not notarized**, so macOS quarantines it after
          download and blocks the first launch (you may see *"CryptoTools.app is damaged"*
          or *"Apple could not verify…"* — both mean the same thing; the app is not corrupted).

          **Easiest — Homebrew** (handles this automatically):

          ```sh
          brew install --cask nyg/tap/crypto-tools
          ```

          **Manual DMG** — after copying CryptoTools.app to Applications, remove the
          quarantine flag once:

          ```sh
          xattr -dr com.apple.quarantine /Applications/CryptoTools.app
          ```

          ## Installing on Windows

          **Easiest — Scoop** (no admin rights, no SmartScreen prompt):

          ```powershell
          scoop bucket add nyg https://github.com/nyg/scoop-bucket
          scoop install crypto-tools
          ```

          **Manual ZIP** — download `CryptoTools.zip`, extract it, and run
          `CryptoTools-Setup.exe` inside. The app installs per-user to
          `%LOCALAPPDATA%` (no admin rights needed). Because the app is not
          code-signed, SmartScreen shows *"Windows protected your PC"* — click
          **More info → Run anyway** (offered to administrators only). Installing
          via Scoop avoids this prompt entirely.
          EOF

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.prepare.outputs.release_version }}" \
            'artifacts/CryptoTools.dmg' 'artifacts/CryptoTools.zip' \
            'artifacts/CryptoTools-Scoop.zip' \
            --title "v${{ needs.prepare.outputs.release_version }}" \
            --verify-tag \
            -F git-cliff/CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute DMG SHA256
        id: sha
        run: |
          # GitHub converts spaces to dots in asset names; CryptoTools.dmg has no spaces
          gh release download "v${{ needs.prepare.outputs.release_version }}" \
            --repo nyg/crypto-tools --pattern "CryptoTools.dmg" --output crypto-tools.dmg
          SHA256=$(sha256sum crypto-tools.dmg | awk '{print $1}')
          echo "dmg_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          rm crypto-tools.dmg
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compute ZIP SHA256
        id: zip_sha
        run: |
          gh release download "v${{ needs.prepare.outputs.release_version }}" \
            --repo nyg/crypto-tools --pattern "CryptoTools-Scoop.zip" --output crypto-tools-scoop.zip
          SHA256=$(sha256sum crypto-tools-scoop.zip | awk '{print $1}')
          echo "zip_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          rm crypto-tools-scoop.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger homebrew tap cask update
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          repository: nyg/homebrew-tap
          event-type: update-crypto-tools-cask
          client-payload: >-
            {
              "version": "${{ needs.prepare.outputs.release_version }}",
              "dmg_sha256": "${{ steps.sha.outputs.dmg_sha256 }}"
            }

      - name: Update Scoop bucket manifest
        env:
          VERSION: ${{ needs.prepare.outputs.release_version }}
          ZIP_SHA256: ${{ steps.zip_sha.outputs.zip_sha256 }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/nyg/scoop-bucket.git" _scoop_bucket
          cd _scoop_bucket
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p bucket
          jq -n \
            --arg version "$VERSION" \
            --arg url "https://github.com/nyg/crypto-tools/releases/download/v${VERSION}/CryptoTools-Scoop.zip" \
            --arg hash "sha256:${ZIP_SHA256}" \
            '{
              version: $version,
              description: "A collection of cryptocurrency tools for Kraken and Binance exchanges.",
              homepage: "https://github.com/nyg/crypto-tools",
              license: "MIT",
              architecture: {
                "64bit": {url: $url, hash: $hash}
              },
              bin: "bin\\launcher.exe",
              shortcuts: [["bin\\launcher.exe", "Crypto Tools"]]
            }' > bucket/crypto-tools.json
          git add bucket/crypto-tools.json
          git commit -m "chore: update crypto-tools to v${VERSION}"
          git push
