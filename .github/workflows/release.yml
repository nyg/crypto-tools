name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

# ──────────────────────────────────────────────────────────────────────────────
# Job 1: Bump version in package.json, commit, tag, push to master
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release }}
    steps:
      - name: Validate branch
        if: github.ref_name != 'master'
        run: |
          echo "::error::Releases must be created from the master branch (current: ${{ github.ref_name }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          new_version=$(npm version ${{ inputs.bump }} --no-git-tag-version | sed 's/^v//')
          echo "release=$new_version" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/v${{ env.RELEASE_VERSION }}"; then
            echo "::error::Tag v${{ env.RELEASE_VERSION }} already exists"
            exit 1
          fi

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore(release): bump version to v${{ env.RELEASE_VERSION }}"
          git tag "v${{ env.RELEASE_VERSION }}"

      - name: Push
        run: |
          git push origin master
          git push origin "v${{ env.RELEASE_VERSION }}"

# ──────────────────────────────────────────────────────────────────────────────
# Job 2: Build Electron artifacts on each native platform
# ──────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # arm64 (Apple Silicon)
            platform: macOS
          - os: windows-latest  # x64
            platform: Windows
          - os: ubuntu-latest   # x64
            platform: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.release_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: error
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Job 3: Assemble GitHub Release
# ──────────────────────────────────────────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.prepare.outputs.release_version }}" \
            dist/*.zip \
            dist/*.exe \
            dist/*.AppImage \
            --title "Release v${{ needs.prepare.outputs.release_version }}" \
            --verify-tag \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
