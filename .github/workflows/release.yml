name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

# ──────────────────────────────────────────────────────────────────────────────
# Job 1: Bump version in package.json, commit, tag, push to master
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release }}
    steps:
      - name: Validate branch
        if: github.ref_name != 'master'
        run: |
          echo "::error::Releases must be created from the master branch (current: ${{ github.ref_name }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          new_version=$(npm version ${{ inputs.bump }} --no-git-tag-version | sed 's/^v//')
          echo "release=$new_version" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$new_version" >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        run: |
          if git show-ref --tags --verify --quiet "refs/tags/v${{ env.RELEASE_VERSION }}"; then
            echo "::error::Tag v${{ env.RELEASE_VERSION }} already exists"
            exit 1
          fi

      - name: Commit and tag
        run: |
          git add package.json
          git commit -m "chore(release): bump version to v${{ env.RELEASE_VERSION }}"
          git tag "v${{ env.RELEASE_VERSION }}"

      - name: Push
        run: |
          git push origin master
          git push origin "v${{ env.RELEASE_VERSION }}"

# ──────────────────────────────────────────────────────────────────────────────
# Job 2: Build Electron artifacts on each native platform
# ──────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15      # arm64 (Apple Silicon, Sequoia — compatible with macOS 26+)
            platform: macOS
          - os: windows-latest  # x64
            platform: Windows
          - os: ubuntu-latest   # x64
            platform: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ needs.prepare.outputs.release_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: ${{ matrix.platform == 'Windows' && 'electron-builder' || '' }}

      - name: Windows packaging diagnostics
        if: always() && matrix.platform == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== dist/ listing ==="
          if (Test-Path dist) {
            Get-ChildItem -Path dist -Recurse -Force |
              Select-Object FullName, Length, Attributes |
              Format-Table -AutoSize | Out-String -Width 4096
          } else {
            Write-Host "dist/ does not exist"
          }

          function Scan-Tree($root) {
            if (-not (Test-Path $root)) { Write-Host "  (missing: $root)"; return }
            $items = Get-ChildItem -Path $root -Recurse -Force -ErrorAction SilentlyContinue
            $count = $items.Count
            $maxPath = ($items | ForEach-Object { $_.FullName.Length } | Measure-Object -Maximum).Maximum
            $reparse = @($items | Where-Object { $_.Attributes -match 'ReparsePoint' })
            Write-Host ("  files+dirs : {0}" -f $count)
            Write-Host ("  max path   : {0}" -f $maxPath)
            Write-Host ("  reparse pts: {0}" -f $reparse.Count)
            if ($reparse.Count -gt 0) {
              Write-Host "  --- reparse points (first 20) ---"
              $reparse | Select-Object -First 20 -ExpandProperty FullName | ForEach-Object { Write-Host "    $_" }
            }
            $longest = $items | Sort-Object { $_.FullName.Length } -Descending | Select-Object -First 5
            Write-Host "  --- longest paths ---"
            $longest | ForEach-Object { Write-Host ("    {0,4}  {1}" -f $_.FullName.Length, $_.FullName) }
          }

          Write-Host "=== scan: .next/standalone ==="
          Scan-Tree ".next/standalone"

          Write-Host "=== scan: dist/win-unpacked ==="
          Scan-Tree "dist/win-unpacked"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/builder-debug.yml
            dist/builder-effective-config.yaml
            dist/*.log
          if-no-files-found: error
          retention-days: 1

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-${{ matrix.platform }}
          path: |
            dist/builder-debug.yml
            dist/builder-effective-config.yaml
            dist/*.log
          if-no-files-found: ignore
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# Job 3: Assemble GitHub Release
# ──────────────────────────────────────────────────────────────────────────────
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: v${{ needs.prepare.outputs.release_version }}
          sparse-checkout: .github

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.prepare.outputs.release_version }}" \
            dist/*.dmg \
            dist/*.exe \
            dist/*.AppImage \
            --title "Release v${{ needs.prepare.outputs.release_version }}" \
            --verify-tag \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
